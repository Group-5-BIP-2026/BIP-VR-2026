name: Android Build

on:
  push:
    branches:
      - Build
  pull_request:
    branches:
      - Build

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

jobs:
  build:
    name: Build project ✨
    runs-on: ubuntu-24.04
    steps:
      - name: Pull Unity Docker image in background
        run: |
          docker pull unityci/editor:ubuntu-6000.3.10f1-android-3 &
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      # Ensure Library Directory Exists
      - name: Ensure Library directory exists
        run: mkdir -p Library
        
      # Cache
      - uses: actions/cache@v5
        with:
          path: Library
          key: Library-Temp-Linux-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Temp-Linux-${{ runner.os }}-
            Library-Temp-Linux-
            Library-Temp-
            
      # Free Disk Space
      - name: Free up Disk Space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /tmp/*
          sudo rm -rf /var/tmp/*
          sudo apt clean
          docker rmi $(docker image ls -aq)
          df -h            
          
      # Build
      - name: Build project
        uses: game-ci/unity-builder@v4.8.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: 6000.3.10f1

      # Ensure Directory Exists
      - name: Ensure build directory exists
        run: mkdir -p build/Android

      # Output
      - uses: actions/upload-artifact@v7
        with:
          name: Build
          path: build/Android